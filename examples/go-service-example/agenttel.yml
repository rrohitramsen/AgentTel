agenttel:
  topology:
    service-name: go-payment-service
    team: payments-platform
    tier: critical
    domain: commerce
    on-call-channel: "#payments-oncall"

  dependencies:
    - name: postgres
      type: database
      criticality: required
      timeout-ms: 5000
    - name: stripe-api
      type: rest_api
      criticality: required
      fallback: "Return cached pricing"

  operations:
    "POST /api/payments":
      expected-latency-p50: 45ms
      expected-latency-p99: 200ms
      expected-error-rate: 0.001
      retryable: true
      idempotent: true
    "GET /api/payments/{id}":
      expected-latency-p50: 15ms
      expected-latency-p99: 80ms
      retryable: true

  baselines:
    rolling-window-size: 1000
    rolling-min-samples: 10

  anomaly-detection:
    z-score-threshold: 3.0

  slo:
    availability:
      target: 0.999
      type: availability

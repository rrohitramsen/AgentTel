server {
    listen 3001;
    root /usr/share/nginx/html;
    index index.html;

    # MCP backend (9 telemetry tools)
    location /mcp {
        proxy_pass http://payment-service:8081/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Instrument MCP server (5 tools)
    location /instrument {
        proxy_pass http://agenttel-instrument:8082/mcp;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Payment service API (traffic generator)
    location /api/ {
        proxy_pass http://payment-service:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Jaeger UI & API (trace deep-links)
    location /jaeger/ {
        proxy_pass http://jaeger:16686/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Agent Manager (start/stop agents, generate telemetry)
    location /admin/ {
        proxy_pass http://agenttel-manager:8083/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Static assets — cache-bust
    location /assets/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback — no cache on index.html
    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
